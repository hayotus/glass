<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Multi Page App</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
  }

  /* top menu */
  .menu {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px;
    background: #1c1c1c;
  }

  .menu button {
    padding: 8px 12px;
    border: 0;
    background: #333;
    color: white;
    cursor: pointer;
    border-radius: 6px;
  }

  .menu button:hover {
    background: #555;
  }

  /* iframe area */
  iframe {
    width: 100%;
    height: calc(100vh - 110px);
    border: none;
    background: white;
  }

  /* bottom control bar */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: #1c1c1c;
    padding: 10px;
  }

  .bottom-bar button {
    flex: 1;
    margin: 0 5px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #444;
    color: white;
    cursor: pointer;
  }

  .bottom-bar button:hover {
    background: #666;
  }
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <button onclick="openPage('index.html')">Home</button>
  <button onclick="openPage('calc.html')">Calc</button>
  <button onclick="openPage('face.html')">Face</button>
  <button onclick="openPage('facescanner.html')">Scanner</button>
  <button onclick="openPage('glass.html')">Glass</button>
  <button onclick="openPage('hotel.html')">Hotel</button>
  <button onclick="openPage('ime.html')">IME</button>
  <button onclick="openPage('info.html')">Info</button>
  <button onclick="openPage('profile.html')">Profile</button>
  <button onclick="openPage('test.html')">Test</button>
  <button onclick="openPage('busyarea.html')">Busy</button>
</div>

<!-- IFRAME -->
<iframe id="frame" src="index.html"></iframe>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button onclick="goBack()">⬅ Back</button>
  <button onclick="refreshPage()">🔄 Refresh</button>
  <button onclick="closePage()">✖ Close</button>
</div>

<script>
  const frame = document.getElementById("frame");

  function openPage(page) {
    frame.src = page;
  }

  function refreshPage() {
    frame.contentWindow.location.reload();
  }

  function goBack() {
    frame.contentWindow.history.back();
  }

  function closePage() {
    frame.src = "about:blank";
  }
</script>

</body>
</html>
